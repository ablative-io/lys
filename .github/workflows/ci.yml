name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Two wire-conformance gates need Go: D6 round-trips signed notes
      # against the Go sumdb/note reference, and D4 round-trips COSE_Sign1
      # attestations against veraison/go-cose (both vendored, hermetic).
      # LYS_REQUIRE_GO turns their developer-machine skip paths into hard
      # failures here, so CI can never silently pass without running them.
      - name: Install Go toolchain (signed-note conformance gate)
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (all targets, warnings are errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace
        env:
          LYS_REQUIRE_GO: "1"

  # Cryptographic dependencies carry real risk; audit them on every change.
  audit:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
